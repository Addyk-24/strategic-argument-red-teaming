name: debate-coach-env
version: "1.0.0"
description: "Argument quality evaluation environment for training LLM reasoning and persuasion"
author: your-hf-username
tasks:
  - name: single_claim
    difficulty: easy
    max_steps: 1
  - name: claim_and_rebuttal
    difficulty: medium
    max_steps: 3
  - name: full_debate
    difficulty: hard
    max_steps: 5
action_space:
  type: structured
  fields:
    - name: argument
      type: string
    - name: phase_tag
      type: string
observation_space:
  type: structured
  fields:
    - topic
    - opponent_challenge
    - done
    - reward
    - phase